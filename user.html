<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketFlow Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="user.css">
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">

    <div class="logo">
      TicketFlow
    </div>

    <div class="topbar-right">
      <span>👤 User</span>

      <a href="index.html" class="logout-btn">
        Logout
      </a>
    </div>

  </header>

  <!-- MAIN LAYOUT -->
  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <a href="#" class="active">Dashboard</a>
      <a href="#" onclick="openModal()">Report Issue</a>
      <a href="#">My Tickets</a>
      <a href="#">Notifications</a>
      <a href="#">Settings</a>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

      <div class="welcome-section">

        <h1>Welcome Back 👋</h1>

        <p>
          Track, manage and report technical issues efficiently.
        </p>

      </div>

      <!-- STATS -->
      <div class="stats">

        <div class="card">
          <h3>Open Tickets</h3>
          <p>12</p>
        </div>

        <div class="card">
          <h3>In Progress</h3>
          <p>5</p>
        </div>

        <div class="card">
          <h3>Resolved</h3>
          <p>28</p>
        </div>

      </div>

      <!-- ACTION SECTION -->
      <div class="action-box">

        <h2>Create New Ticket</h2>

        <p>
          Submit and track system or service issues quickly.
        </p>

        <button onclick="openModal()">
          + Report Issue
        </button>

      </div>

    </main>

  </div>

 <!-- MODAL -->
<div class="modal" id="ticketModal">

  <div class="modal-content">

    <!-- MODAL HEADER -->
    <div class="modal-header">

      <h2>Report Issue</h2>

      <span class="close-btn" onclick="closeModal()">
        &times;
      </span>

    </div>

    <!-- FORM -->
    <form>

      <div class="form-grid">

        <!-- TITLE -->
        <div class="form-group full-width">

          <label>Ticket Title</label>

          <input 
            type="text" 
            placeholder="Enter ticket title"
            required
          >

        </div>

        <!-- CATEGORY -->
        <div class="form-group">

          <label>Category</label>

          <select required>
            <option value="">Select Category</option>
            <option>Hardware</option>
            <option>Software</option>
            <option>Network</option>
            <option>System</option>
            <option>Other</option>
          </select>

        </div>

        <!-- PRIORITY -->
        <div class="form-group">

          <label>Priority</label>

          <select required>
            <option value="">Select Priority</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
            <option>Critical</option>
          </select>

        </div>

        <!-- DESCRIPTION -->
        <div class="form-group full-width">

          <label>Description</label>

          <textarea 
            rows="6" 
            placeholder="Describe the issue in detail..."
            required
          ></textarea>

        </div>

      </div>

      <!-- BUTTONS -->
      <div class="modal-footer">

        <button 
          type="button" 
          class="cancel-btn"
          onclick="closeModal()"
        >
          Cancel
        </button>

        <button 
          type="submit" 
          class="submit-btn"
        >
          Submit Ticket
        </button>

      </div>

    </form>

  </div>

</div>

  <script>

    function openModal() {
      document.getElementById("ticketModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("ticketModal").style.display = "none";
    }

    window.onclick = function(event) {

      let modal = document.getElementById("ticketModal");

      if(event.target == modal){
        modal.style.display = "none";
      }

    }

  </script>

</body>
</html>
